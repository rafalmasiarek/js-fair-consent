# Added from shared-config: files/common/.github/dependabot.yml.tpl

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
        - "dependencies"
        - "github-actions"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "eslint"
        versions: ["5.x"]
    allow:
      - dependency-type: "direct"
